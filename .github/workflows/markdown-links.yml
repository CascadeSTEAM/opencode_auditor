name: Check Markdown Links

on:
  pull_request:
    paths:
      - "**.md"

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: -- *.md docs/**/*.md .github/**/*.md --verbose
          fail: true
